<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KinhMat AI - Chatbot Tư Vấn Kính Mắt</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .chat-container {
    background: white;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    width: 100%;
    max-width: 700px;
    height: 90vh;
    max-height: 750px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .chat-header {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .avatar {
    width: 50px; height: 50px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }
  .header-info h2 { font-size: 18px; font-weight: 700; }
  .header-info p { font-size: 13px; opacity: 0.85; margin-top: 2px; }
  .status-dot {
    width: 10px; height: 10px;
    background: #4ade80;
    border-radius: 50%;
    display: inline-block;
    margin-right: 5px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Messages area */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    background: #f8f9ff;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

  /* Message bubbles */
  .message { display: flex; align-items: flex-end; gap: 8px; max-width: 85%; }
  .message.user { align-self: flex-end; flex-direction: row-reverse; }
  .message.bot  { align-self: flex-start; }

  .bubble {
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .user .bubble {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border-bottom-right-radius: 4px;
  }
  .bot .bubble {
    background: white;
    color: #1e293b;
    border-bottom-left-radius: 4px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .bot .msg-avatar  { background: #ede9fe; }
  .user .msg-avatar { background: #667eea; }

  /* Products cards */
  .products-section { margin-top: 10px; }
  .products-grid { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
  .product-card {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 13px;
  }
  .product-card .product-name { font-weight: 700; color: #1e293b; margin-bottom: 4px; }
  .product-card .product-price { color: #7c3aed; font-weight: 600; }
  .product-card .product-price .original { color: #94a3b8; text-decoration: line-through; font-size: 12px; margin-left: 6px; }
  .product-card .product-badge {
    display: inline-block;
    background: #fef3c7; color: #92400e;
    font-size: 11px; padding: 2px 7px;
    border-radius: 20px; margin-left: 6px;
  }
  .product-card .product-meta { color: #64748b; margin-top: 4px; font-size: 12px; }

  /* Source badge */
  .source-badge {
    font-size: 11px;
    color: #94a3b8;
    margin-top: 4px;
    text-align: right;
  }

  /* Typing indicator */
  .typing-indicator {
    display: none;
    align-self: flex-start;
    align-items: flex-end;
    gap: 8px;
  }
  .typing-indicator.show { display: flex; }
  .typing-dots {
    background: white;
    padding: 12px 16px;
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    display: flex; gap: 4px; align-items: center;
  }
  .typing-dots span {
    width: 8px; height: 8px;
    background: #94a3b8;
    border-radius: 50%;
    animation: bounce 1.4s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-8px); }
  }

  /* Quick replies */
  .quick-replies {
    padding: 10px 20px;
    background: white;
    border-top: 1px solid #f1f5f9;
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .quick-btn {
    background: #f1f5f9;
    border: 1px solid #e2e8f0;
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 12px;
    color: #475569;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .quick-btn:hover { background: #ede9fe; color: #7c3aed; border-color: #c4b5fd; }

  /* Input area */
  .chat-input {
    padding: 16px 20px;
    background: white;
    border-top: 1px solid #f1f5f9;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .chat-input textarea {
    flex: 1;
    border: 2px solid #e2e8f0;
    border-radius: 14px;
    padding: 12px 16px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    max-height: 120px;
    min-height: 46px;
    transition: border-color 0.2s;
    line-height: 1.5;
  }
  .chat-input textarea:focus { border-color: #667eea; }
  .chat-input textarea::placeholder { color: #94a3b8; }
  .send-btn {
    width: 46px; height: 46px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: white;
    font-size: 20px;
    flex-shrink: 0;
    transition: transform 0.2s, opacity 0.2s;
  }
  .send-btn:hover { transform: scale(1.05); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
</style>
</head>
<body>

<div class="chat-container">
  <!-- Header -->
  <div class="chat-header">
    <div class="avatar">🕶️</div>
    <div class="header-info">
      <h2>KinhMat AI</h2>
      <p><span class="status-dot"></span>Trợ lý tư vấn kính mắt thông minh</p>
    </div>
  </div>

  <!-- Messages -->
  <div class="chat-messages" id="messages">
    <div class="message bot">
      <div class="msg-avatar">🤖</div>
      <div>
        <div class="bubble">Xin chào! Mình là trợ lý tư vấn kính mắt của shop. 👋

Mình có thể giúp bạn:
• Chọn kính phù hợp khuôn mặt
• Tư vấn theo phong cách và ngân sách
• Giải đáp về chất liệu, tính năng
• Tìm kiếm sản phẩm theo yêu cầu

Bạn cần tư vấn gì ạ? 😊</div>
      </div>
    </div>
  </div>

  <!-- Typing indicator -->
  <div class="typing-indicator" id="typing">
    <div class="msg-avatar">🤖</div>
    <div class="typing-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- Quick replies -->
  <div class="quick-replies">
    <button class="quick-btn" onclick="sendQuick(this)">Kính cho mặt tròn</button>
    <button class="quick-btn" onclick="sendQuick(this)">Kính dưới 300k</button>
    <button class="quick-btn" onclick="sendQuick(this)">Chống ánh sáng xanh</button>
    <button class="quick-btn" onclick="sendQuick(this)">Phong cách Hàn Quốc</button>
    <button class="quick-btn" onclick="sendQuick(this)">Chính sách bảo hành</button>
  </div>

  <!-- Input -->
  <div class="chat-input">
    <textarea id="userInput" placeholder="Nhập câu hỏi của bạn..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
const API_URL = '/api/chat';
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const typingEl = document.getElementById('typing');

// Session ID
const sessionId = 'session_' + Math.random().toString(36).substr(2, 9);

// Auto-resize textarea
inputEl.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// Enter to send (Shift+Enter = new line)
inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function sendQuick(btn) {
  inputEl.value = btn.textContent;
  sendMessage();
}

async function sendMessage() {
  const message = inputEl.value.trim();
  if (!message) return;

  // Add user message
  addMessage(message, 'user');
  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;

  // Show typing
  showTyping(true);
  scrollBottom();

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, session_id: sessionId })
    });

    const data = await res.json();
    showTyping(false);

    if (data.error) {
      addBotMessage('Xin lỗi, có lỗi xảy ra: ' + data.error, [], 'error');
    } else {
      addBotMessage(data.reply, data.products || [], data.source);
    }

  } catch (err) {
    showTyping(false);
    addBotMessage('Không kết nối được server. Vui lòng thử lại!', [], 'error');
    console.error(err);
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

function addMessage(text, role) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = `
    <div class="msg-avatar">${role === 'user' ? '👤' : '🤖'}</div>
    <div><div class="bubble">${escapeHtml(text)}</div></div>
  `;
  messagesEl.appendChild(div);
  scrollBottom();
}

function addBotMessage(text, products, source) {
  const div = document.createElement('div');
  div.className = 'message bot';

  // Format text (markdown-like)
  let formattedText = escapeHtml(text)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/~~(.+?)~~/g, '<s>$1</s>')
    .replace(/💡|✨|🔥|⚠️|✅|🕶️|💰|🔧|👤|📝/g, m => m);

  let productsHtml = '';
  if (products && products.length > 0) {
    productsHtml = `<div class="products-section">
      <div style="font-size:13px;color:#64748b;margin-bottom:6px;">📦 Sản phẩm gợi ý:</div>
      <div class="products-grid">${products.map(productCard).join('')}</div>
    </div>`;
  }

  const sourceLabels = {
    'qa_pair': 'Từ dữ liệu Q&A',
    'tfidf_qa': 'Phân tích ngữ nghĩa',
    'database': 'Từ database',
    'hybrid': 'Kết hợp',
    'template': '',
    'fallback': '',
  };
  const sourceHtml = sourceLabels[source] ? `<div class="source-badge">${sourceLabels[source]}</div>` : '';

  div.innerHTML = `
    <div class="msg-avatar">🤖</div>
    <div>
      <div class="bubble">${formattedText}${productsHtml}</div>
      ${sourceHtml}
    </div>
  `;
  messagesEl.appendChild(div);
  scrollBottom();
}

function productCard(p) {
  const price = p.effective_price || p.sale_price || p.price || 0;
  const hasDiscount = p.discount_percent > 0;
  const discountBadge = hasDiscount ? `<span class="product-badge">-${p.discount_percent}%</span>` : '';
  const originalPrice = hasDiscount ? `<span class="original">${formatMoney(p.price)}</span>` : '';
  const genderMap = { male: 'Nam', female: 'Nữ', unisex: 'Unisex' };
  const stockWarn = p.stock <= 3 ? `<span style="color:#ef4444">⚠️ Còn ${p.stock}</span>` : '<span style="color:#22c55e">✅ Còn hàng</span>';

  return `
    <div class="product-card">
      <div class="product-name">🕶️ ${escapeHtml(p.name || '')}${p.brand ? ` <small style="color:#94a3b8">(${p.brand})</small>` : ''}</div>
      <div class="product-price">
        ${formatMoney(price)}${originalPrice}${discountBadge}
      </div>
      <div class="product-meta">
        ${p.frame_material ? `🔧 ${p.frame_material} &nbsp;` : ''}
        ${p.gender ? `👤 ${genderMap[p.gender] || p.gender} &nbsp;` : ''}
        ${stockWarn}
      </div>
      ${p.description ? `<div class="product-meta" style="margin-top:4px">📝 ${escapeHtml(p.description.substring(0, 80))}${p.description.length > 80 ? '...' : ''}</div>` : ''}
    </div>
  `;
}

function formatMoney(n) {
  return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(n);
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.appendChild(document.createTextNode(text || ''));
  return div.innerHTML;
}

function showTyping(show) {
  typingEl.classList.toggle('show', show);
  if (show) scrollBottom();
}

function scrollBottom() {
  setTimeout(() => {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }, 50);
}
</script>
</body>
</html>
